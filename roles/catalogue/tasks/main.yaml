   - name: Remove default version of nodejs
     ansible.builtin.command:
       cmd: dnf module disable nodejs -y

   - name: Enable required version of nodejs
     ansible.builtin.command:
       cmd: dnf module enable nodejs:20 -y

   - name: Install nodejs
     ansible.builtin.dnf:
       name: nodejs
       state: present

   - name: Create roboshop user with nologin
     ansible.builtin.user:
       name: roboshop
       create_home: yes
       shell: /sbin/nologin
       comment: roboshop system user  
   # Safe to remove directory, because 2nd time if we run it will download freshly. no error if does not exist
   - name: Remove app directory
     ansible.builtin.file:
      path: /app
      state: absent
   # Create app directory
   - name: Create app directory
     ansible.builtin.file:
       path: /app
       state: directory
   # Delete existing downloaded code
   - name: Delete catalogue file
     ansible.builtin.file:
      path: /tmp/catalogue.zip
      state: absent
   # Download fresh code to temp directory
   - name: Download catalogue code
     ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/catalogue-v3.zip
      dest: /tmp/catalogue.zip
   # unzip the code and move it to App directory.
   - name: Unzip code and move to app directory
     ansible.builtin.unarchive:
      src: /tmp/catalogue.zip
      dest: /app 
      remote_src: yes
   # Install dependencies
   - name: Install packages dependencies
     community.general.npm:
       path: /app
# Setup mongodb connection with Catalogue
   # Copy mongo-repo
   - name: Copy mongo repo
     ansible.builtin.copy:
       src: mongo.repo
       dest: /etc/yum.repos.d/mongo.repo
   # Install mongodb client 
   - name: Install mongodb client
     ansible.builtin.dnf:
      name: mongodb-mongosh
      state: present
   # Load schemas
   - name: Load schemas into mongodb
     ansible.builtin.shell: mongosh --host mongodb.rscloudservices.icu </app/db/master-data.js
   # Service setup
   - name: Setup service
     ansible.builtin.copy:
       src: catalogue.service
       dest: /etc/systemd/system/catalogue.service
       
   - name: Start and enable catalogue service
     ansible.builtin.service:
       name: catalogue
       state: started
       enabled: yes
       daemon-reload: true
